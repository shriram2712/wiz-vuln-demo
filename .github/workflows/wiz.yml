name: Wiz Enriched Scan

on:
  push:
    branches: [main]
  pull_request:

jobs:
  wiz-scan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install tabulate

      - name: Download Wiz CLI
        run: |
          curl -o wizcli https://downloads.wiz.io/v1/wizcli/latest/wizcli-linux-amd64
          chmod +x wizcli
          sudo mv wizcli /usr/local/bin/wizcli
          wizcli version

      - name: Authenticate Wiz CLI
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}
        run: wizcli auth --id "$WIZ_CLIENT_ID" --secret "$WIZ_CLIENT_SECRET"

      # === SCA: source dependency scan ===
      - name: Wiz Directory Scan (SCA)
        run: |
          wizcli dir scan --path . \
            --output dir.sarif,sarif,vulnerabilities \
            --output dir.txt,human,vulnerabilities
          echo "=== SCA Scan Output ==="
          cat dir.txt || true
        continue-on-error: true

      # === IaC: Dockerfile misconfiguration scan ===
      - name: Wiz Dockerfile Scan (IaC)
        run: |
          wizcli iac scan --path ./Dockerfile \
            --output dockerfile.sarif,sarif,misconfigurations \
            --output dockerfile.txt,human,misconfigurations
          echo "=== IaC Scan Output ==="
          cat dockerfile.txt || true
        continue-on-error: true

      # === Container image scan ===
      - name: Build Docker Image
        run: docker build -t wiz-vuln-demo:${{ github.sha }} .
        continue-on-error: true

      - name: Wiz Container Image Scan
        if: success()
        run: |
          wizcli docker scan \
            --image wiz-vuln-demo:${{ github.sha }} \
            --output image.sarif,sarif,vulnerabilities \
            --output image.txt,human,vulnerabilities
          echo "=== Image Scan Output ==="
          cat image.txt || true
        continue-on-error: true

      # === Enrich SARIF + print demo table ===
      - name: Enrich and Display Reports
        if: always()
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}
          WIZ_API_URL: "https://api.us1.app.wiz.io/graphql"
        run: python .github/workflows/wizsarif.py

      # === Upload enriched SARIFs to GitHub Security tab ===
      - name: Upload SCA SARIF
        if: always() && hashFiles('dir.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: dir.sarif
          category: wiz-sca

      - name: Upload IaC SARIF
        if: always() && hashFiles('dockerfile.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: dockerfile.sarif
          category: wiz-iac

      - name: Upload Image SARIF
        if: always() && hashFiles('image.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: image.sarif
          category: wiz-image
