name: Wiz Enriched Scan
on: [push]

jobs:
  wiz-scan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests tabulate

      - name: Download Wiz CLI
        run: |
          curl -o wizcli https://downloads.wiz.io/v1/wizcli/latest/wizcli-linux-amd64
          chmod +x wizcli
          sudo mv wizcli /usr/local/bin/wizcli
          wizcli version

      - name: Authenticate Wiz CLI
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}
        run: wizcli auth --id "$WIZ_CLIENT_ID" --secret "$WIZ_CLIENT_SECRET"

      # === 1. Scan source dependencies (existing behavior) ===
      - name: Wiz Directory Scan (SCA)
        run: |
          wizcli dir scan --path . \
            --format sarif \
            --output dir.sarif,sarif,vulnerabilities
        continue-on-error: true

      # === 2. Scan the Dockerfile itself (IaC misconfigs) ===
      - name: Wiz Dockerfile Scan (IaC)
        run: |
          wizcli iac scan --path ./Dockerfile \
            --format sarif \
            --output dockerfile.sarif,sarif,misconfigurations
        continue-on-error: true

      # === 3. Build and scan the container image ===
      - name: Build Docker Image
        run: docker build -t ${{ github.repository }}:${{ github.sha }} .

      - name: Wiz Container Image Scan
        run: |
          wizcli docker scan \
            --image ${{ github.repository }}:${{ github.sha }} \
            --format sarif \
            --output image.sarif,sarif,vulnerabilities
        continue-on-error: true

      # === 4. Enrich and display all three ===
      - name: Enrich and Display Reports
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}
          WIZ_API_URL: "https://api.us1.app.wiz.io/graphql"
        run: python .github/workflows/wizsarif.py

      # === 5. Upload each SARIF to GitHub Security tab ===
      - name: Upload Dir Scan SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: dir.sarif
          category: wiz-sca

      - name: Upload Dockerfile Scan SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: dockerfile.sarif
          category: wiz-iac

      - name: Upload Image Scan SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: image.sarif
          category: wiz-image
