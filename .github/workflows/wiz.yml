name: Wiz Enriched Scan

on:
  push:
    branches: [main]
  pull_request:

env:
  COLUMNS: "250"
  TERM: xterm-256color
  ACTIONS_RUNNER_DEBUG: true
  ACTIONS_STEP_DEBUG: true

jobs:
  wiz-scan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install tabulate

      - name: Download Wiz CLI
        run: |
          curl -o wizcli https://downloads.wiz.io/v1/wizcli/latest/wizcli-linux-amd64
          chmod +x wizcli
          sudo mv wizcli /usr/local/bin/wizcli
          wizcli version

      - name: Authenticate Wiz CLI
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}
        run: wizcli auth --id "$WIZ_CLIENT_ID" --secret "$WIZ_CLIENT_SECRET"

      # === SCA: source dependency scan ===
      - name: Wiz Directory Scan (SCA)
        run: |
          echo "::group::🔍 Wiz SCA Scan"
          wizcli dir scan --path . \
            --output dir.sarif,sarif,vulnerabilities \
            --output dir.txt,human,vulnerabilities || true
          echo "::endgroup::"

          echo "::group::📋 SCA Findings Table"
          cat dir.txt || echo "No text output produced"
          echo "::endgroup::"
        continue-on-error: true

      # === IaC: Dockerfile misconfiguration scan ===
      - name: Wiz Dockerfile Scan (IaC)
        run: |
          echo "::group::🔍 Wiz IaC Scan"
          wizcli iac scan --path ./Dockerfile \
            --output dockerfile.sarif,sarif,misconfigurations \
            --output dockerfile.txt,human,misconfigurations || true
          echo "::endgroup::"

          echo "::group::📋 IaC Findings Table"
          cat dockerfile.txt || echo "No text output produced"
          echo "::endgroup::"
        continue-on-error: true

      # === Container image build ===
      - name: Build Docker Image
        run: |
          echo "::group::🐳 Docker Build"
          docker build -t wiz-vuln-demo:${{ github.sha }} .
          echo "::endgroup::"
        continue-on-error: true

      # === Container image scan for SARIF (default driver — reliable upload) ===
      # Now also includes --policies flag to apply customer's CI/CD policy
      - name: Wiz Container Image Scan (SARIF)
        if: success()
        run: |
          echo "::group::🔍 Wiz Container Image Scan (for SARIF upload)"
          wizcli docker scan \
            --image wiz-vuln-demo:${{ github.sha }} \
            --policies "Zee-Container-Security" \
            --output image.sarif,sarif,vulnerabilities \
            --output image.txt,human,vulnerabilities || true
          echo "::endgroup::"

          echo "::group::📋 Image Findings Table"
          cat image.txt || echo "No text output produced"
          echo "::endgroup::"
        continue-on-error: true

      # === Container image scan for per-layer JSON (mountWithLayers needs root) ===
      # WITH --policies flag for the customer's policy (Zee-Container-Security)
      - name: Wiz Container Image Scan (per-layer JSON)
        if: success()
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}
        run: |
          echo "::group::🔑 Re-auth wizcli as root (needed for overlay2 driver)"
          sudo -E $(which wizcli) auth --id "$WIZ_CLIENT_ID" --secret "$WIZ_CLIENT_SECRET"
          echo "::endgroup::"

          echo "::group::🔍 Wiz Container Image Scan - Per Layer (JSON only) WITH POLICY"
          sudo -E $(which wizcli) docker scan \
            --image wiz-vuln-demo:${{ github.sha }} \
            --driver mountWithLayers \
            --policies "Zee-Container-Security" \
            --output image-layers.json,json,vulnerabilities \
            --output image-layers-policy.txt,human,vulnerabilities || true
          echo "::endgroup::"

          echo "::group::📋 Policy-applied scan output (human format, first 100 lines)"
          cat image-layers-policy.txt 2>/dev/null | head -100 || echo "no human output"
          echo "::endgroup::"
        continue-on-error: true

      # === Fix ownership on all output files so Python can overwrite them ===
      - name: Fix file ownership
        if: always()
        run: |
          echo "::group::📂 File ownership check"
          echo "Before fix:"
          ls -la *.sarif *.txt *.json 2>/dev/null || true
          echo ""
          echo "Taking ownership of all scan outputs..."
          sudo chown -R $USER:$USER . 2>/dev/null || true
          sudo chmod 666 *.sarif *.txt *.json 2>/dev/null || true
          echo ""
          echo "After fix:"
          ls -la *.sarif *.txt *.json 2>/dev/null || true
          echo "::endgroup::"

      # === Diagnostic: inspect wizcli JSON structure ===
      - name: Inspect wizcli output structure
        if: always()
        run: |
          echo "::group::📄 image-layers.json structure"
          python3 -c "
          import json
          with open('image-layers.json') as f:
              data = json.load(f)
          result = data.get('result', {})
          print('result keys:', list(result.keys()))
          for key in ['osPackages', 'libraries', 'applications', 'secrets']:
              items = result.get(key, [])
              if items:
                  print(f'{key}: {len(items)} items')
                  sample = items[0]
                  print(f'  sample keys: {list(sample.keys())}')
                  vulns = sample.get('vulnerabilities', [])
                  if vulns:
                      print(f'  vuln sample keys: {list(vulns[0].keys())}')
          " 2>/dev/null || echo "python inspect failed"
          echo "::endgroup::"

      # === NEW: Findings analyzer (Wiz vs Prisma comparison) ===
      - name: Analyze findings (Wiz vs Prisma)
        if: always() && hashFiles('image-layers.json') != ''
        run: |
          echo "::group::📊 Findings Breakdown Analysis"
          python .github/workflows/analyze_findings.py
          echo "::endgroup::"

      # === NEW: Upload analysis artifact for download ===
      - name: Upload analysis artifact
        if: always() && hashFiles('findings_analysis.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: findings-analysis
          path: |
            findings_analysis.json
            image-layers.json
            image-layers-policy.txt
          retention-days: 7

      # === Enrich SARIF + print clean summary table + per-layer report ===
      - name: Enrich and Display Summary
        if: always()
        run: |
          echo "::group::📊 Enriched Summary Report"
          python .github/workflows/wizsarif.py
          echo "::endgroup::"

      # === Pre-upload diagnostics ===
      - name: Diagnose image SARIF before upload
        if: always() && hashFiles('image.sarif') != ''
        run: |
          echo "::group::📏 Image SARIF pre-upload diagnostics"
          echo "File size: $(du -h image.sarif | cut -f1)"
          echo "File size in bytes: $(wc -c < image.sarif)"
          python3 -c "
          import json
          with open('image.sarif') as f:
              s = json.load(f)
          total_results = sum(len(r.get('results', [])) for r in s.get('runs', []))
          total_rules = sum(len(r.get('tool', {}).get('driver', {}).get('rules', [])) for r in s.get('runs', []))
          versions = [r.get('tool', {}).get('driver', {}).get('version', 'unknown') for r in s.get('runs', [])]
          print(f'Total results: {total_results}')
          print(f'Total rules: {total_rules}')
          print(f'Tool versions: {versions}')
          print(f'Schema: {s.get(\"\$schema\", \"none\")}')
          print(f'Version: {s.get(\"version\", \"none\")}')
          "
          echo "::endgroup::"

      - name: Deep SARIF diagnostic
        if: always() && hashFiles('image.sarif') != ''
        run: |
          echo "::group::🔬 Deep SARIF diagnostic"
          python .github/workflows/diagnose_sarif.py image.sarif
          echo "::endgroup::"

      - name: Upload diagnostic sample artifact
        if: always() && hashFiles('sarif_sample_results.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: sarif-sample-results
          path: sarif_sample_results.json
          retention-days: 7

      # === Upload enriched SARIFs to GitHub Security tab ===
      - name: Upload SCA SARIF
        if: always() && hashFiles('dir.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: dir.sarif
          category: wiz-sca

      - name: Upload IaC SARIF
        if: always() && hashFiles('dockerfile.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: dockerfile.sarif
          category: wiz-iac

      - name: Upload Image SARIF
        if: always() && hashFiles('image.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: image.sarif
          category: wiz-image
